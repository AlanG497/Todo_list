<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        
        .todo-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .todo-input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            transition: border-color 0.3s;
        }
        
        .todo-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .add-button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        
        .add-button:hover {
            background-color: #5568d3;
        }
        
        .add-button:active {
            transform: scale(0.98);
        }
        
        .todo-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        
        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s;
        }
        
        .todo-item:hover {
            background-color: #f9f9f9;
        }
        
        .todo-item span {
            user-select: none;
        }
        
        .delete-button {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s;
            font-size: 14px;
        }
        
        .delete-button:hover {
            background-color: #ee5a52;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="dist/to-do.js"></script>
</body>
</html>
